<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡密管理系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      background-image: 
        radial-gradient(at 0% 0%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 191, 255, 0.08) 0%, transparent 50%);
      min-height: 100vh;
      padding: 20px;
      color: #e0e0e0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, rgba(15, 15, 25, 0.9), rgba(20, 20, 35, 0.95));
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      margin-bottom: 30px;
      border: 1px solid rgba(138, 43, 226, 0.2);
    }

    .header h1 {
      color: #fff;
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(15, 15, 25, 0.95), rgba(20, 20, 35, 0.98));
      padding: 25px;
      border-radius: 15px;
      border: 1px solid rgba(138, 43, 226, 0.2);
    }

    .stat-label {
      color: #a0a0b0;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: bold;
      background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .main-content {
      background: linear-gradient(135deg, rgba(15, 15, 25, 0.95), rgba(20, 20, 35, 0.98));
      padding: 30px;
      border-radius: 15px;
      border: 1px solid rgba(138, 43, 226, 0.2);
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid rgba(102, 126, 234, 0.1);
    }

    th {
      background: rgba(30, 30, 46, 0.9);
      color: #e0e0e0;
    }

    tr:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .card-key {
      font-family: 'Courier New', monospace;
      background: rgba(102, 126, 234, 0.15);
      padding: 5px 10px;
      border-radius: 5px;
      color: #8ab4f8;
    }

    .status-unused {
      background: rgba(30, 144, 255, 0.2);
      color: #5dade2;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .status-used {
      background: rgba(155, 89, 182, 0.2);
      color: #bb8fce;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎫 卡密管理系统</h1>
      <p style="color: #a0a0b0;">实时同步验证系统数据</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">📊 卡密总量</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">✅ 已使用</div>
        <div class="stat-value" id="usedCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⏳ 未使用</div>
        <div class="stat-value" id="unusedCount">0</div>
      </div>
    </div>

    <div class="main-content">
      <div class="controls">
        <button class="btn btn-primary" onclick="refreshData()">🔄 刷新</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>卡密</th>
            <th>状态</th>
            <th>创建时间</th>
            <th>使用时间</th>
            <th>使用者IP</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" style="text-align:center; padding:40px;">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    async function loadData() {
      try {
        const response = await fetch(`${API_BASE}/cardkeys/all`);
        const result = await response.json();
        
        if (result.success) {
          const cardKeys = result.cardKeys;
          
          // 统计
          const total = cardKeys.length;
          const used = cardKeys.filter(k => k.status === 'used').length;
          const unused = total - used;
          
          document.getElementById('totalCount').textContent = total;
          document.getElementById('usedCount').textContent = used;
          document.getElementById('unusedCount').textContent = unused;
          
          // 表格
          const tbody = document.getElementById('tableBody');
          if (cardKeys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">暂无数据</td></tr>';
            return;
          }
          
          tbody.innerHTML = cardKeys.map(item => `
            <tr>
              <td><span class="card-key">${item.cardKey}</span></td>
              <td><span class="status-${item.status}">${item.status === 'used' ? '✅ 已使用' : '⏳ 未使用'}</span></td>
              <td>${item.createdAt || '-'}</td>
              <td>${item.usedAt || '-'}</td>
              <td>${item.ipAddress || '-'}</td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('加载失败:', error);
      }
    }

    function refreshData() {
      loadData();
    }

    // 初始化
    loadData();
    setInterval(loadData, 5000); // 每5秒刷新
  </script>
</body>
</html>
