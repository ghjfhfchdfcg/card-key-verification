<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎫 Kiro 卡密验证</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 32px;
      color: #667eea;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result.success {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      display: block;
    }

    .result.error {
      background: #ffebee;
      border: 2px solid #f44336;
      display: block;
    }

    .result-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result.success .result-title {
      color: #2e7d32;
    }

    .result.error .result-title {
      color: #c62828;
    }

    .result-content {
      font-size: 14px;
      line-height: 1.6;
    }

    .credential-info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
    }

    .credential-info pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
      color: #212529;
    }

    .credential-info div {
      margin-bottom: 8px;
      word-break: break-all;
    }

    .credential-info strong {
      color: #667eea;
      display: inline-block;
      min-width: 120px;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .copy-btn {
      background: #007bff;
      color: white;
    }

    .copy-btn:hover {
      background: #0056b3;
      transform: translateY(-2px);
    }

    .download-btn {
      background: #28a745;
      color: white;
    }

    .download-btn:hover {
      background: #1e7e34;
      transform: translateY(-2px);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn.copied {
      background: #6c757d;
    }

    .download-info {
      background: #fff3cd;
      border: 2px solid #ffc107;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      font-size: 14px;
      color: #856404;
    }

    .download-info strong {
      display: block;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .stats {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
      color: #666;
      font-size: 12px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎫 Kiro 卡密验证</h1>
      <p>输入卡密获取 Kiro 账号凭证</p>
    </div>

    <form id="verifyForm">
      <div class="form-group">
        <label for="cardKey">卡密</label>
        <input 
          type="text" 
          id="cardKey" 
          name="cardKey" 
          placeholder="KIRO-XXXX-XXXX-XXXX"
          maxlength="19"
          required
          autocomplete="off"
        >
        <div class="hint">格式: KIRO-XXXX-XXXX-XXXX</div>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        验证卡密
      </button>
    </form>

    <div class="result" id="result"></div>

    <div class="stats" id="stats">
      服务器启动中...
    </div>
  </div>

  <script>
    const form = document.getElementById('verifyForm');
    const cardKeyInput = document.getElementById('cardKey');
    const submitBtn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const stats = document.getElementById('stats');

    // 自动格式化输入
    cardKeyInput.addEventListener('input', (e) => {
      let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      let formatted = '';
      
      if (value.startsWith('KIRO')) {
        formatted = 'KIRO-';
        value = value.substring(4);
      }
      
      for (let i = 0; i < value.length && i < 12; i++) {
        if (i > 0 && i % 4 === 0) {
          formatted += '-';
        }
        formatted += value[i];
      }
      
      e.target.value = formatted;
    });

    // 获取统计信息
    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        const data = await response.json();
        if (data.success) {
          stats.textContent = `服务器运行中 • 已存储 ${data.totalCardKeys} 个卡密`;
        }
      } catch (error) {
        stats.textContent = '服务器连接失败';
      }
    }

    // 下载JSON文件
    function downloadJSON(credential, cardKey) {
      const timestamp = Date.now();
      const fileName = `claim_${timestamp}.json`;
      
      // 构建标准格式的凭证数据（与FlowPilot生成的格式一致）
      const credentialData = [{
        email: credential.email,
        provider: credential.provider || 'BuilderId',
        refreshToken: credential.refreshToken,
        clientId: credential.clientId,
        clientSecret: credential.clientSecret,
        region: credential.region,
        machineId: credential.machineId
      }];
      
      const jsonStr = JSON.stringify(credentialData, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      return fileName;
    }

    // 提交表单
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const cardKey = cardKeyInput.value.trim();
      
      if (!cardKey) {
        showResult(false, '请输入卡密');
        return;
      }

      // 禁用按钮
      submitBtn.disabled = true;
      submitBtn.innerHTML = '验证中<span class="loading"></span>';
      result.style.display = 'none';

      try {
        const response = await fetch('/api/verify', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ cardKey })
        });

        const data = await response.json();

        if (data.success && data.credential) {
          // 构建标准格式的凭证数据
          const credentialData = [{
            email: data.credential.email,
            provider: data.credential.provider || 'BuilderId',
            refreshToken: data.credential.refreshToken,
            clientId: data.credential.clientId,
            clientSecret: data.credential.clientSecret,
            region: data.credential.region,
            machineId: data.credential.machineId
          }];
          
          const jsonStr = JSON.stringify(credentialData, null, 2);
          
          // 验证成功，显示完整JSON和操作按钮
          showResult(true, 
            `<div class="result-title">✅ 验证成功</div>
            <div class="result-content">
              <div class="download-info">
                <strong>🎫 卡密验证成功</strong>
                以下是您的 Kiro 账号凭证信息
              </div>
              
              <div class="credential-info">
                <pre id="jsonContent">${jsonStr}</pre>
              </div>
              
              <div class="action-buttons">
                <button class="action-btn copy-btn" onclick="copyJSON()">
                  📋 复制 JSON
                </button>
                <button class="action-btn download-btn" onclick="downloadJSON()">
                  💾 下载 JSON
                </button>
              </div>
              
              <div style="margin-top: 15px; padding: 10px; background: #fff3cd; border-radius: 8px; font-size: 12px; color: #856404;">
                💡 <strong>使用方法：</strong><br>
                1. 点击"复制 JSON"或"下载 JSON"保存凭证<br>
                2. 将凭证导入到 Kiro 桌面客户端使用<br>
                3. 该卡密已被标记为已使用，不可重复验证
              </div>
            </div>`
          );
          
          // 将数据存储到全局变量供复制和下载使用
          window.currentCredential = credentialData;
          window.currentCardKey = cardKey;
          
          // 清空输入框
          cardKeyInput.value = '';
        } else {
          showResult(false, 
            `<div class="result-title">❌ 验证失败</div>
            <div class="result-content">${data.message || data.error || '未找到对应的卡密'}</div>`
          );
        }
      } catch (error) {
        showResult(false, 
          `<div class="result-title">❌ 验证失败</div>
          <div class="result-content">网络错误: ${error.message}</div>`
        );
      } finally {
        // 恢复按钮
        submitBtn.disabled = false;
        submitBtn.textContent = '验证卡密';
      }
    });

    function showResult(success, html) {
      result.className = `result ${success ? 'success' : 'error'}`;
      result.innerHTML = html;
      result.style.display = 'block';
    }

    // 复制JSON到剪贴板
    function copyJSON() {
      if (!window.currentCredential) {
        alert('没有可复制的数据');
        return;
      }

      const jsonStr = JSON.stringify(window.currentCredential, null, 2);
      
      // 使用现代剪贴板API
      navigator.clipboard.writeText(jsonStr).then(() => {
        // 修改按钮文字显示已复制
        const copyBtn = document.querySelector('.copy-btn');
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '✅ 已复制';
        copyBtn.classList.add('copied');
        
        // 2秒后恢复原文字
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
          copyBtn.classList.remove('copied');
        }, 2000);
      }).catch(err => {
        // 降级方案：使用旧的execCommand方式
        const textarea = document.createElement('textarea');
        textarea.value = jsonStr;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        
        try {
          document.execCommand('copy');
          const copyBtn = document.querySelector('.copy-btn');
          const originalText = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ 已复制';
          copyBtn.classList.add('copied');
          
          setTimeout(() => {
            copyBtn.innerHTML = originalText;
            copyBtn.classList.remove('copied');
          }, 2000);
        } catch (err) {
          alert('复制失败，请手动复制');
        }
        
        document.body.removeChild(textarea);
      });
    }

    // 下载JSON文件（使用全局变量）
    function downloadJSON() {
      if (!window.currentCredential) {
        alert('没有可下载的数据');
        return;
      }

      const timestamp = Date.now();
      const fileName = `claim_${timestamp}.json`;
      
      const jsonStr = JSON.stringify(window.currentCredential, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      // 修改按钮文字显示已下载
      const downloadBtn = document.querySelector('.download-btn');
      const originalText = downloadBtn.innerHTML;
      downloadBtn.innerHTML = '✅ 已下载';
      
      setTimeout(() => {
        downloadBtn.innerHTML = originalText;
      }, 2000);
    }

    // 页面加载时获取统计信息
    loadStats();
    setInterval(loadStats, 10000); // 每10秒更新一次
  </script>
</body>
</html>
